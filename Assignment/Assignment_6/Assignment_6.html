  <script>

const slider = document.querySelector(".slider");
const arrow = document.querySelector("#arrow");

let currentSlide = 0;

arrow.addEventListener("click", (e) => {
    e.preventDefault();

    if (currentSlide === 0) {
        slider.scrollTo({
            left: slider.clientWidth,
            behavior: "smooth"
        });

        currentSlide = 1;
        arrow.classList.add("left");
        arrow.textContent = "<";
    } else {
        slider.scrollTo({
            left: 0,
            behavior: "smooth"
        });

        currentSlide = 0;
        arrow.classList.remove("left");
        arrow.textContent = ">";
    }
});
  </script>
