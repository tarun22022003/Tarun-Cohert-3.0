<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h1 style="color:red;">My First Form</h1>
    <form action="" style="border: 5px solid; border-color: bisque; width: 500px;">
        <h2 style="margin-left: 15px;">Enter your details:</h2>
        <ol style="display: block; color: black;">
              <li> <input type="text" placeholder="Enter your Name"> </li> <br>
              <li style="margin-bottom: 15px;"> <textarea name="Address" id="" rows="2" <input placeholder="Address" ></textarea> </li> <br>
              <li> <label for="Course">Select Course</label>
                 <select name="Course" id="">
                <option value="Web Dev">Web DEV</option>
                <option value="Data Analyst">Data Science</option>
                <option value="Java dev">Java Dev</option>
              </select></li><br>
               <button>Submit</button>
        </ol>

    </form>
</body>
</html>
